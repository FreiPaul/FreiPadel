# Production compose file. `make ship` / `make ship-local-build` install this
# on the server as docker-compose.yml — keep it in sync with the local
# docker-compose.yml except for deliberate prod differences.
services:
  freipadel:
    build: .
    # Tag the built image explicitly so `make ship-local-build` can push a
    # pre-built image and have `docker compose up` (no --build) pick it up.
    image: freipadel:latest
    container_name: freipadel
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # SQLite database + scraper config.json live here
      - ./data:/data
    environment:
      # How often to re-scrape court availability
      SCRAPE_INTERVAL_MINUTES: "30"
      # Prod is served over HTTPS (reverse proxy), so session cookies are
      # marked Secure and never sent over plain HTTP.
      COOKIE_SECURE: "1"
